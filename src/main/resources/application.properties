# ========================
# SERVER
# ========================
server.port=${PORT:8083}

# ========================
# APP
# ========================
spring.application.name=${APP_NAME:ai-service}

# ========================
# POSTGRES
# ========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:5}
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:20}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:300000}
spring.datasource.hikari.connection-timeout=${DB_CONN_TIMEOUT:20000}

# ========================
# JPA
# ========================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:true}
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=${LAZY_LOAD:true}

# ========================
# THREADS
# ========================
spring.threads.virtual.enabled=${VIRTUAL_THREADS:true}

# ========================
# EUREKA
# ========================
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=${EUREKA_RENEWAL:10}
eureka.instance.lease-expiration-duration-in-seconds=${EUREKA_EXPIRATION:30}

# ========================
# FEIGN
# ========================
feign.client.config.default.connect-timeout=${FEIGN_CONNECT_TIMEOUT:5000}
feign.client.config.default.read-timeout=${FEIGN_READ_TIMEOUT:10000}
spring.cloud.openfeign.circuitbreaker.enabled=true

ai.groq.api-key=${GROQ_API_KEY}
ai.groq.base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1}
ai.groq.free.model=${GROQ_FREE_MODEL:llama-3.1-8b-instant}
ai.groq.pro.model=${GROQ_PRO_MODEL:llama-3.3-70b-versatile}


# ?? JWT ??????????????????????????????????????????????????
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=86400000
jwt.refresh.expiration.ms=2592000000


# ========================
# RATE LIMIT
# ========================
rate.limit.requests-per-minute=${RATE_LIMIT_RPM:10}

# ========================
# LOGGING
# ========================
logging.level.com.launchpath.ai_service=${LOG_AI_SERVICE:DEBUG}
logging.level.org.springframework.web=${LOG_SPRING_WEB:INFO}
logging.level.com.netflix.eureka=${LOG_EUREKA:WARN}
logging.level.com.netflix.discovery=${LOG_EUREKA:WARN}

# ========================
# ACTUATOR
# ========================
management.endpoints.web.exposure.include=${ACTUATOR_ENDPOINTS:health,info,metrics}
management.endpoint.health.show-details=${HEALTH_DETAILS:always}